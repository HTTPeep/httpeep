name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue! Please fill out the information below as detailed as possible to help us locate and fix the problem quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please list the steps to reproduce this issue
      placeholder: |
        1. Open '...'
        2. Click on '...'
        3. Scroll to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened
      placeholder: Actually...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Your operating system
      options:
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - macOS 12 (Monterey)
        - Windows 11
        - Windows 10
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Other (please specify in additional info)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: HTTPeep Version
      description: The version of HTTPeep you are using
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Screen Recording
      description: If possible, add screenshots or screen recordings to help explain the problem
      placeholder: Drag and drop images here...

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: If there are any relevant error logs, please paste them here
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add any other context about the problem
