name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature suggestion! Your ideas are very important to us. Please describe your request in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Pain Point
      description: Is your suggestion related to a problem? Please describe
      placeholder: I'm always frustrated when I try to [...] because...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the scenario where this feature would be used
      placeholder: This feature could be used for...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I've also considered...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Useful but not urgent
        - High - Really need this
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups or Screenshots
      description: If available, add mockups, screenshots, or reference images
      placeholder: Drag and drop images here...

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add any other context about the feature request
